zabbix_export:
  version: '6.0'
  date: '2026-02-27T17:49:11Z'
  groups:
    - uuid: 57b7ae836ca64446ba2c296389c009b7
      name: Templates/Modules
  templates:
    - uuid: d8fa3533f14540a3bec5b22dff78b6f9
      template: 'ICMP Ping by NOC'
      name: 'ICMP Ping by NOC'
      groups:
        - name: Templates/Modules
      items:
        - uuid: afc4ec66e18d4d3a9962332d4aa73488
          name: 'ICMP loss'
          type: SIMPLE
          key: 'icmppingloss[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}]'
          history: 7d
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: c3dc408f575348ed85a9ec56011a2b95
              expression: |
                min(/ICMP Ping by NOC/icmppingloss[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.TIME_CHECK})>{$ICMP_LOSS_WARN} and 
                min(/ICMP Ping by NOC/icmppingloss[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.TIME_CHECK})<100
              name: 'PING: Alta perda de pacotes ICMP {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'PING: Indisponível por ping ICMP (IP: {HOST.CONN})'
                  expression: 'last(/ICMP Ping by NOC/icmpping[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.PING.HIGH})=0'
                  recovery_expression: 'last(/ICMP Ping by NOC/icmpping[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.PING.HIGH.REC})=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 0c729bc15e604ade93c9af8eea0bb8d1
          name: 'ICMP response time'
          type: SIMPLE
          key: 'icmppingsec[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}]'
          history: 7d
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: e281289b0c054045b8daa7fa88e23877
              expression: 'avg(/ICMP Ping by NOC/icmppingsec[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.TIMECHECK})>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'PING: Tempo de resposta de ping ICMP está alto {ITEM.LASTVALUE1} (>{$ICMP.RESPONSE.TIME.WARNING})'
              priority: WARNING
              dependencies:
                - name: 'PING: Alta perda de pacotes ICMP {ITEM.LASTVALUE1}'
                  expression: |
                    min(/ICMP Ping by NOC/icmppingloss[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.TIME_CHECK})>{$ICMP_LOSS_WARN} and 
                    min(/ICMP Ping by NOC/icmppingloss[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.TIME_CHECK})<100
                - name: 'PING: Indisponível por ping ICMP (IP: {HOST.CONN})'
                  expression: 'last(/ICMP Ping by NOC/icmpping[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.PING.HIGH})=0'
                  recovery_expression: 'last(/ICMP Ping by NOC/icmpping[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.PING.HIGH.REC})=1'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 09598adbc0834d0a95624c41456087bc
          name: 'ICMP ping'
          type: SIMPLE
          key: 'icmpping[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}]'
          history: 7d
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 92bfe8ba14f54fc98c9819f11219ec6c
              expression: 'last(/ICMP Ping by NOC/icmpping[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.PING.HIGH})=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/ICMP Ping by NOC/icmpping[,{$ICMP.PACKETS},,,{$ICMP.TIMEOUT}],{$ICMP.PING.HIGH.REC})=1'
              name: 'PING: Indisponível por ping ICMP (IP: {HOST.CONN})'
              priority: HIGH
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
      macros:
        - macro: '{$ICMP.PACKETS}'
          value: '4'
          description: 'quantidade de pacotes de ping'
        - macro: '{$ICMP.PING.HIGH}'
          value: 1m
          description: 'tempo sem resposta de ping para alarmar'
        - macro: '{$ICMP.PING.HIGH.REC}'
          value: 2m
          description: 'tempo de resposta de ping para resolver'
        - macro: '{$ICMP.TIMEOUT}'
          value: '200'
          description: milissegundos
        - macro: '{$ICMP.TIME_CHECK}'
          value: 5m
          description: 'tempo de análise para as triggers de ICMP'
        - macro: '{$ICMP_LOSS_WARN}'
          value: '50'
          description: '% de pacotes perdidos'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'porém deve se usar a unidade de medida em segundos (1000ms = 1s)'
      valuemaps:
        - uuid: 8476de931e66420ea740a86b10cc6d0b
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
    - uuid: 9dcb09b2d440454c86e114fe7c30bbd9
      template: 'Linux network interfaces by NOC'
      name: 'Linux network interfaces by NOC'
      description: 'Generated by official Zabbix template tool "Templator"'
      groups:
        - name: Templates/Modules
      discovery_rules:
        - uuid: cea8a6556428463f987a192c06f099fd
          name: 'Network interface discovery'
          type: ZABBIX_ACTIVE
          key: net.if.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.MATCHES}'
                formulaid: A
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
          description: 'The discovery of network interfaces.'
          item_prototypes:
            - uuid: 7f47bcdee92a444492acbbfbe6a3fa17
              name: 'Interface {#IFNAME}: Inbound packets discarded'
              type: ZABBIX_ACTIVE
              key: 'net.if.in["{#IFNAME}",dropped]'
              delay: 3m
              history: 7d
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 7759c115cf1d4ccb98a4a1b1a3af7d9d
              name: 'Interface {#IFNAME}: Inbound packets with errors'
              type: ZABBIX_ACTIVE
              key: 'net.if.in["{#IFNAME}",errors]'
              delay: 3m
              history: 7d
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 6467e573932745cea873762ed3ed5969
              name: 'Interface {#IFNAME}: Inbound packets'
              key: 'net.if.in["{#IFNAME}",packets]'
              history: 7d
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 675811fa99d34464ba4f891c75e6376a
              name: 'Interface {#IFNAME}: Bits received'
              type: ZABBIX_ACTIVE
              key: 'net.if.in["{#IFNAME}"]'
              delay: 3m
              history: 7d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: e4419d2896404a0bb6f60645f3fa142d
              name: 'Interface {#IFNAME}: Outbound packets discarded'
              type: ZABBIX_ACTIVE
              key: 'net.if.out["{#IFNAME}",dropped]'
              delay: 3m
              history: 7d
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: dc4ca07546a146c7b0f5f1badb7e8fc3
              name: 'Interface {#IFNAME}: Outbound packets with errors'
              type: ZABBIX_ACTIVE
              key: 'net.if.out["{#IFNAME}",errors]'
              delay: 3m
              history: 7d
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 619f5e4f697a41a78b4c7a4cc827c7c3
              name: 'Interface {#IFNAME}: Outbound packets'
              key: 'net.if.out["{#IFNAME}",packets]'
              history: 7d
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 37cc580bdd14430d83ffda0719c17390
              name: 'Interface {#IFNAME}: Bits sent'
              type: ZABBIX_ACTIVE
              key: 'net.if.out["{#IFNAME}"]'
              delay: 3m
              history: 7d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 8e4b37065efc44ae8464aaf3f4b7e5a1
              name: 'Interface {#IFNAME}: Operational status'
              type: ZABBIX_ACTIVE
              key: 'vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"]'
              history: 7d
              trends: '0'
              description: 'Reference: https://www.kernel.org/doc/Documentation/networking/operstates.txt'
              valuemap:
                name: ifOperStatus
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var newvalue;
                      switch(value) {
                        case "unknown":
                          newvalue = 0;
                          break;
                        case "notpresent":
                          newvalue = 1;
                          break;
                        case "down":
                          newvalue = 2;
                          break;
                        case "lowerlayerdown":
                          newvalue = 3;
                          break;
                        case "testing":
                          newvalue = 4;
                          break;
                        case "dormant":
                          newvalue = 5;
                          break;
                        case "up":
                          newvalue = 6;
                          break;  default:
                          newvalue = "Problem parsing interface operstate in JS";
                      }
                      return newvalue;
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 222f24f2d24249c4861e4c5d147eade5
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])=2 and (last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#1)<>last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
                  name: 'NETWORK: interface {#IFNAME}: Link down'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the operations status is down.
                    2. `{$IFCONTROL:"{#IFNAME}"}=1` - a user can redefine context macro to value - 0. That marks this interface as not important. No new trigger will be fired if this interface is down.
                    3. `{TEMPLATE_NAME:METRIC.diff()}=1` - the trigger fires only if the operational status was up to (1) sometime before (so, do not fire for the 'eternal off' interfaces.)
                    
                    WARNING: if closed manually - it will not fire again on the next poll, because of .diff.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 94deec10e32d4412852ca4ac5483130c
              name: 'Interface {#IFNAME}: Speed'
              type: ZABBIX_ACTIVE
              key: 'vfs.file.contents["/sys/class/net/{#IFNAME}/speed"]'
              delay: 5m
              history: 7d
              trends: '0'
              units: bps
              description: |
                It indicates the latest or current speed value of the interface. The value is an integer representing the link speed expressed in bits/sec.
                This attribute is only valid for the interfaces that implement the ethtool `get_link_ksettings` method (mostly Ethernet).
                
                Reference: https://www.kernel.org/doc/Documentation/ABI/testing/sysfs-class-net
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1000000'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 12a2037fe44846eeaea834d7f9ef3283
              name: 'Interface {#IFNAME}: Interface type'
              type: ZABBIX_ACTIVE
              key: 'vfs.file.contents["/sys/class/net/{#IFNAME}/type"]'
              delay: 1h
              history: 7d
              trends: '0'
              description: |
                It indicates the interface protocol type as a decimal value.
                See `include/uapi/linux/if_arp.h` for all possible values.
                Reference: https://www.kernel.org/doc/Documentation/ABI/testing/sysfs-class-net
              valuemap:
                name: 'Linux::Interface protocol types'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
          trigger_prototypes:
            - uuid: 49982af67dbb40d8bb14764b19c6a3da
              expression: |
                change(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"])<0 and last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"])>0
                and
                (last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/type"])=6 or last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/type"])=1)
                and
                (last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])<>2)
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                (change(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"])>0 and last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"],#2)>0) or
                (last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])=2)
              name: 'NETWORK:  interface {#IFNAME}: Ethernet has changed to lower speed than it was before'
              opdata: 'Current reported speed: {ITEM.LASTVALUE1}'
              priority: INFO
              description: 'This Ethernet connection has transitioned down from its known maximum speed. This might be a sign of autonegotiation issues. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              dependencies:
                - name: 'NETWORK: interface {#IFNAME}: Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])=2 and (last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#1)<>last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#2))'
                  recovery_expression: 'last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: performance
            - uuid: a41f0073ffc348bf949b2df2170ca24b
              expression: |
                (avg(/Linux network interfaces by NOC/net.if.in["{#IFNAME}"],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"]) or
                avg(/Linux network interfaces by NOC/net.if.out["{#IFNAME}"],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"])) and
                last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                avg(/Linux network interfaces by NOC/net.if.in["{#IFNAME}"],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"]) and
                avg(/Linux network interfaces by NOC/net.if.out["{#IFNAME}"],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/speed"])
              name: 'NETWORK: interface {#IFNAME}: High bandwidth usage'
              event_name: 'Interface {#IFNAME}: High bandwidth usage (>{$IF.UTIL.MAX:"{#IFNAME}"}%)'
              opdata: 'In: {ITEM.LASTVALUE1}, out: {ITEM.LASTVALUE3}, speed: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'The utilization of the network interface is close to its estimated maximum bandwidth.'
              manual_close: 'YES'
              dependencies:
                - name: 'NETWORK: interface {#IFNAME}: Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])=2 and (last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#1)<>last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#2))'
                  recovery_expression: 'last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: performance
            - uuid: ae4fa0d24cdc4ff4ba66fb6b26af7222
              expression: |
                min(/Linux network interfaces by NOC/net.if.in["{#IFNAME}",errors],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
                or min(/Linux network interfaces by NOC/net.if.out["{#IFNAME}",errors],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                max(/Linux network interfaces by NOC/net.if.in["{#IFNAME}",errors],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
                and max(/Linux network interfaces by NOC/net.if.out["{#IFNAME}",errors],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
              name: 'NETWORK: interface {#IFNAME}: High error rate'
              event_name: 'Interface {#IFNAME}: High error rate (>{$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
              opdata: 'errors in: {ITEM.LASTVALUE1}, errors out: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'It recovers when it is below 80% of the `{$IF.ERRORS.WARN:"{#IFNAME}"}` threshold.'
              manual_close: 'YES'
              dependencies:
                - name: 'NETWORK: interface {#IFNAME}: Link down'
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])=2 and (last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#1)<>last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"],#2))'
                  recovery_expression: 'last(/Linux network interfaces by NOC/vfs.file.contents["/sys/class/net/{#IFNAME}/operstate"])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
          graph_prototypes:
            - uuid: f58b54c8ec2b4752b0fc4fbf9286b79e
              name: 'Interface {#IFNAME}: Network traffic'
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 199C0D
                  item:
                    host: 'Linux network interfaces by NOC'
                    key: 'net.if.in["{#IFNAME}"]'
                - sortorder: '1'
                  drawtype: BOLD_LINE
                  color: F63100
                  item:
                    host: 'Linux network interfaces by NOC'
                    key: 'net.if.out["{#IFNAME}"]'
                - sortorder: '2'
                  color: 00611C
                  yaxisside: RIGHT
                  item:
                    host: 'Linux network interfaces by NOC'
                    key: 'net.if.out["{#IFNAME}",errors]'
                - sortorder: '3'
                  color: F7941D
                  yaxisside: RIGHT
                  item:
                    host: 'Linux network interfaces by NOC'
                    key: 'net.if.in["{#IFNAME}",errors]'
                - sortorder: '4'
                  color: FC6EA3
                  yaxisside: RIGHT
                  item:
                    host: 'Linux network interfaces by NOC'
                    key: 'net.if.out["{#IFNAME}",dropped]'
                - sortorder: '5'
                  color: 6C59DC
                  yaxisside: RIGHT
                  item:
                    host: 'Linux network interfaces by NOC'
                    key: 'net.if.in["{#IFNAME}",dropped]'
      macros:
        - macro: '{$IF.ERRORS.WARN}'
          value: '2'
        - macro: '{$IF.UTIL.MAX}'
          value: '90'
          description: 'This macro is used as a threshold in the interface utilization trigger.'
        - macro: '{$IFCONTROL}'
          value: '1'
        - macro: '{$NET.IF.IFNAME.MATCHES}'
          value: '^.*$'
        - macro: '{$NET.IF.IFNAME.NOT_MATCHES}'
          value: '(^Software Loopback Interface|^NULL[0-9.]*$|^[Ll]o[0-9.]*$|^[Ss]ystem$|^Nu[0-9.]*$|^veth[0-9A-z]+$|docker[0-9]+|br-[a-z0-9]{12})'
          description: 'It filters out `loopbacks`, `nulls`, `docker veth` links and `docker0 bridge` by default.'
      dashboards:
        - uuid: 160e29decc47491c901cdd755ee74d24
          name: 'Network interfaces'
          pages:
            - widgets:
                - type: GRAPH_PROTOTYPE
                  width: '24'
                  height: '5'
                  fields:
                    - type: INTEGER
                      name: columns
                      value: '1'
                    - type: GRAPH_PROTOTYPE
                      name: graphid
                      value:
                        host: 'Linux network interfaces by NOC'
                        name: 'Interface {#IFNAME}: Network traffic'
                    - type: INTEGER
                      name: rows
                      value: '1'
      valuemaps:
        - uuid: ae45f55b76384a2d9606552796d17949
          name: ifOperStatus
          mappings:
            - value: '0'
              newvalue: unknown
            - value: '1'
              newvalue: notpresent
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: lowerlayerdown
            - value: '4'
              newvalue: testing
            - value: '5'
              newvalue: dormant
            - value: '6'
              newvalue: up
        - uuid: 74c26bcaaee945c79517a1f4fb1c3565
          name: 'Linux::Interface protocol types'
          mappings:
            - value: '0'
              newvalue: 'from KA9Q: NET/ROM pseudo'
            - value: '1'
              newvalue: Ethernet
            - value: '2'
              newvalue: 'Experimental Ethernet'
            - value: '3'
              newvalue: 'AX.25 Level 2'
            - value: '4'
              newvalue: 'PROnet token ring'
            - value: '5'
              newvalue: Chaosnet
            - value: '6'
              newvalue: 'IEEE 802.2 Ethernet/TR/TB'
            - value: '7'
              newvalue: ARCnet
            - value: '8'
              newvalue: APPLEtalk
            - value: '15'
              newvalue: 'Frame Relay DLCI'
            - value: '19'
              newvalue: ATM
            - value: '23'
              newvalue: 'Metricom STRIP (new IANA id)'
            - value: '24'
              newvalue: 'IEEE 1394 IPv4 - RFC 2734'
            - value: '27'
              newvalue: EUI-64
