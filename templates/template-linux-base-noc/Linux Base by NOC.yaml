          name: 'Linux: System name'
          type: ZABBIX_ACTIVE
          key: system.hostname
          delay: 1h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'The host name of the system.'
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 4e223fdd13b34feb94b07caf89d55c42
              expression: 'change(/Linux Base by NOC/system.hostname)=1 and last(/Linux Base by NOC/system.hostname,#1)<>0'
              name: 'HOST: O nome do sistema foi alterado ({ITEM.LASTVALUE2} > {ITEM.LASTVALUE1})'
              priority: INFO
              description: 'O nome do sistema mudou. Confirme para fechar o problema manualmente.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: 9ad71d183ea849b4a5e3cd24ff779ddb
          name: 'Linux: System local time'
          type: ZABBIX_ACTIVE
          key: system.localtime
          history: 7d
          units: unixtime
          description: 'The local system time of the host.'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 6c94db1faa11460ebd40da678c2777c9
              expression: 'fuzzytime(/Linux Base by NOC/system.localtime,{$SYSTEM.FUZZYTIME.MAX})=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'fuzzytime(/Linux Base by NOC/system.localtime,{$SYSTEM.FUZZYTIME.MAX})<>1'
              name: 'HOST: A hora do sistema está fora de sincronia (diferança maios que {$SYSTEM.FUZZYTIME.MAX}s do servidor Zabbix)'
              priority: WARNING
              description: 'The host''s system time is different from Zabbix server time.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
