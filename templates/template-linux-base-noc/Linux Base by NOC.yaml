              expression: 'last(/Linux Base by NOC/system.uptime)<10m'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Linux Base by NOC/system.uptime)>=10m'
              name: 'HOST: {HOST.NAME} foi reiniciado (uptime < 10m)'
              priority: INFO
              description: 'The host uptime is less than 10 minutes.'
              manual_close: 'YES'
              tags:
                - tag: scope
