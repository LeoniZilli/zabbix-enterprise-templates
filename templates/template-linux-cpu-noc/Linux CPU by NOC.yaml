        - uuid: bacaea3c6aa24116b5df29d86bbdf205
          name: 'Linux: CPU utilization'
          type: DEPENDENT
          key: system.cpu.util
          delay: '0'
          history: 7d
          value_type: FLOAT
          units: '%'
          description: 'The CPU utilization expressed in %.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  //Calculate utilization
                  return (100 - value)
          master_item:
            key: 'system.cpu.util[,idle]'
          tags:
            - tag: component
              value: cpu
          triggers:
            - uuid: 349c9c5f70b94a10beb35ce9d6a3aa88
              expression: 'min(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_CHECK_AVG})>={$CPU.UTIL.AVG}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_REC_AVG})<{$CPU.UTIL.AVG}'
              name: 'CPU: Utilização acima de {$CPU.UTIL.AVG}% por mais de {$CPU.UTIL.TIME_CHECK_AVG} (Última coleta:  {ITEM.LASTVALUE})'
              priority: AVERAGE
              description: 'The CPU utilization is too high. The system might be slow to respond.'
              manual_close: 'YES'
              dependencies:
                - name: 'CPU: Utilização acima de {$CPU.UTIL.HIGH}% por mais de {$CPU.UTIL.TIME_CHECK_HIGH} (Última coleta:  {ITEM.LASTVALUE})'
                  expression: 'min(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_CHECK_HIGH})>={$CPU.UTIL.HIGH}'
                  recovery_expression: 'max(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_REC_HIGH})<{$CPU.UTIL.HIGH}'
              tags:
                - tag: scope
                  value: performance
            - uuid: 8ae2525e43f64517ac98c5b2a85551a1
              expression: 'min(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_CHECK_HIGH})>={$CPU.UTIL.HIGH}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_REC_HIGH})<{$CPU.UTIL.HIGH}'
              name: 'CPU: Utilização acima de {$CPU.UTIL.HIGH}% por mais de {$CPU.UTIL.TIME_CHECK_HIGH} (Última coleta:  {ITEM.LASTVALUE})'
              priority: HIGH
              description: 'The CPU utilization is too high. The system might be slow to respond.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: performance
            - uuid: 071b27f32c1d4d9d9faf1e8637fb3862
              expression: 'min(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_CHECK_WARN})>={$CPU.UTIL.WARN}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_REC_WARN})<{$CPU.UTIL.WARN}'
              name: 'CPU: Utilização acima de {$CPU.UTIL.WARN}% por mais de {$CPU.UTIL.TIME_CHECK_WARN} (Última coleta:  {ITEM.LASTVALUE})'
              priority: WARNING
              description: 'The CPU utilization is too high. The system might be slow to respond.'
              dependencies:
                - name: 'CPU: Utilização acima de {$CPU.UTIL.AVG}% por mais de {$CPU.UTIL.TIME_CHECK_AVG} (Última coleta:  {ITEM.LASTVALUE})'
                  expression: 'min(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_CHECK_AVG})>={$CPU.UTIL.AVG}'
                  recovery_expression: 'max(/Linux CPU by NOC/system.cpu.util,{$CPU.UTIL.TIME_REC_AVG})<{$CPU.UTIL.AVG}'
              tags:
                - tag: scope
                  value: performance
