  triggers:
    - uuid: 8e84934fc0334cb3b17f311e344c6395
      expression: |
        min(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_CHECK})> {$MEMORY.UTIL.AVG} and 
        last(/Linux memory by NOC/vm.memory.size[available]) and
        last(/Linux memory by NOC/vm.memory.size[total])
      recovery_mode: RECOVERY_EXPRESSION
      recovery_expression: 'max(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_REC})<{$MEMORY.UTIL.AVG}'
      name: 'MEMORY: Utilização acima de {$MEMORY.UTIL.AVG}% por mais de {$MEMORY.UTIL.TIME_CHECK} (Livre: {ITEM.VALUE2}, Total: {ITEM.VALUE3})'
      priority: AVERAGE
      description: 'The system is running out of free memory.'
      manual_close: 'YES'
      dependencies:
        - name: 'MEMORY: Utilização acima de {$MEMORY.UTIL.HIGH}% por mais de {$MEMORY.UTIL.TIME_CHECK} (Livre: {ITEM.VALUE2}, Total: {ITEM.VALUE3})'
          expression: |
            min(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_CHECK})> {$MEMORY.UTIL.HIGH} and 
            last(/Linux memory by NOC/vm.memory.size[available]) and
            last(/Linux memory by NOC/vm.memory.size[total])
          recovery_expression: 'max(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_REC})<{$MEMORY.UTIL.HIGH}'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance
    - uuid: d2f9c72dc14a457ab098133aedee00fa
      expression: |
        min(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_CHECK})> {$MEMORY.UTIL.HIGH} and 
        last(/Linux memory by NOC/vm.memory.size[available]) and
        last(/Linux memory by NOC/vm.memory.size[total])
      recovery_mode: RECOVERY_EXPRESSION
      recovery_expression: 'max(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_REC})<{$MEMORY.UTIL.HIGH}'
      name: 'MEMORY: Utilização acima de {$MEMORY.UTIL.HIGH}% por mais de {$MEMORY.UTIL.TIME_CHECK} (Livre: {ITEM.VALUE2}, Total: {ITEM.VALUE3})'
      priority: HIGH
      description: 'The system is running out of free memory.'
      manual_close: 'YES'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance
    - uuid: e04c47f8b9b54298b24970f87b38fd1f
      expression: |
        min(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_CHECK})> {$MEMORY.UTIL.WARN} and 
        last(/Linux memory by NOC/vm.memory.size[available]) and
        last(/Linux memory by NOC/vm.memory.size[total])
      recovery_mode: RECOVERY_EXPRESSION
      recovery_expression: 'max(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_REC})<{$MEMORY.UTIL.WARN}'
      name: 'MEMORY: Utilização acima de {$MEMORY.UTIL.WARN}% por mais de {$MEMORY.UTIL.TIME_CHECK} (Livre: {ITEM.VALUE2}, Total: {ITEM.VALUE3})'
      status: DISABLED
      priority: WARNING
      description: 'The system is running out of free memory.'
      manual_close: 'YES'
      dependencies:
        - name: 'MEMORY: Utilização acima de {$MEMORY.UTIL.AVG}% por mais de {$MEMORY.UTIL.TIME_CHECK} (Livre: {ITEM.VALUE2}, Total: {ITEM.VALUE3})'
          expression: |
            min(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_CHECK})> {$MEMORY.UTIL.AVG} and 
            last(/Linux memory by NOC/vm.memory.size[available]) and
            last(/Linux memory by NOC/vm.memory.size[total])
          recovery_expression: 'max(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_REC})<{$MEMORY.UTIL.AVG}'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance
    - uuid: 619799346362499bb1ea39594b8f3063
      expression: |
        max(/Linux memory by NOC/system.swap.size[,pfree],{$SWAP.TIME_CHECK})<={$SWAP.PFREE.MIN.AVG} and 
        last(/Linux memory by NOC/system.swap.size[,total])>0 and
        last(/Linux memory by NOC/system.swap.size[,free])
      recovery_mode: RECOVERY_EXPRESSION
      recovery_expression: 'min(/Linux memory by NOC/system.swap.size[,pfree],{$SWAP.TIME_REC})>{$SWAP.PFREE.MIN.AVG}'
      name: 'SWAP: Alto  uso do espaço swap (menos de {$SWAP.PFREE.MIN.AVG}% livre) (Livre {ITEM.LASTVALUE3} de {ITEM.VALUE2})'
      status: DISABLED
      priority: AVERAGE
      description: 'If there is no swap configured, this trigger is ignored.'
      manual_close: 'YES'
      dependencies:
        - name: 'MEMORY: Utilização acima de {$MEMORY.UTIL.HIGH}% por mais de {$MEMORY.UTIL.TIME_CHECK} (Livre: {ITEM.VALUE2}, Total: {ITEM.VALUE3})'
          expression: |
            min(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_CHECK})> {$MEMORY.UTIL.HIGH} and 
            last(/Linux memory by NOC/vm.memory.size[available]) and
            last(/Linux memory by NOC/vm.memory.size[total])
          recovery_expression: 'max(/Linux memory by NOC/vm.memory.utilization,{$MEMORY.UTIL.TIME_REC})<{$MEMORY.UTIL.HIGH}'
      tags:
        - tag: scope
          value: capacity
