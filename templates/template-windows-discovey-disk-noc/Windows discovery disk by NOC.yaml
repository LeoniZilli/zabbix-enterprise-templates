zabbix_export:
  version: '6.0'
  date: '2026-03-04T12:00:38Z'
  groups:
    - uuid: 57b7ae836ca64446ba2c296389c009b7
      name: Templates/Modules
  templates:
    - uuid: b8a784fb7ed94adb916490d5d135b5c1
      template: 'Windows  discovery disk by NOC'
      name: 'Windows  discovery disk by NOC'
      description: 'Generated by official Zabbix template tool "Templator"'
      groups:
        - name: Templates/Modules
      discovery_rules:
        - uuid: a7b27933b05447239089783beee5ef15
          name: 'Mounted filesystem discovery'
          type: ZABBIX_ACTIVE
          key: vfs.fs.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#FSDRIVETYPE}'
                value: '{$VFS.FS.FSDRIVETYPE.MATCHES}'
                formulaid: A
              - macro: '{#FSDRIVETYPE}'
                value: '{$VFS.FS.FSDRIVETYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#FSNAME}'
                value: '{$VFS.FS.FSNAME.MATCHES}'
                formulaid: C
              - macro: '{#FSNAME}'
                value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: D
              - macro: '{#FSTYPE}'
                value: '{$VFS.FS.FSTYPE.MATCHES}'
                formulaid: E
              - macro: '{#FSTYPE}'
                value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: F
          description: 'Discovery of file systems of different types.'
          item_prototypes:
            - uuid: 399773a968fa4fc597641b5f54920273
              name: '{#FSLABEL}({#FSNAME}): Space utilization'
              type: ZABBIX_ACTIVE
              key: 'vfs.fs.size[{#FSNAME},pused]'
              history: 7d
              value_type: FLOAT
              units: '%'
              description: 'Space utilization in % for {#FSNAME}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
            - uuid: bb4989920f47464db59b619c3610b0f0
              name: '{#FSLABEL}({#FSNAME}): Total space'
              type: ZABBIX_ACTIVE
              key: 'vfs.fs.size[{#FSNAME},total]'
              history: 7d
              units: B
              description: 'Total space in bytes'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
            - uuid: b47ee3bee2dd4bdfb8123ee788419e72
              name: '{#FSLABEL}({#FSNAME}): Used space'
              type: ZABBIX_ACTIVE
              key: 'vfs.fs.size[{#FSNAME},used]'
              history: 7d
              units: B
              description: 'Used storage in bytes'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
          trigger_prototypes:
            - uuid: 9aaa8556c7ef401b8000544723eff433
              expression: |
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.SIZE.PUSED_DIST:"{#FSNAME}"} and 
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and 
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused], 5m)<{$VFS.FS.SIZE.PUSED_DIST:"{#FSNAME}"}'
              name: 'DISK: O espaço livre de disco é inferior a 1% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
              priority: DISASTER
              description: |
                Two conditions should match:
                1. The first condition - utilization of the space should be above `{$VFS.FS.PUSED.MAX.CRIT:"{#FSNAME}"}`.
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: capacity
            - uuid: 2e1f87edd3a54d9da7bdbd6df0aff0e5
              expression: |
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.SIZE.PUSED_HIGH:"{#FSNAME}"}  and 
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and 
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused], 5m)<{$VFS.FS.SIZE.PUSED_HIGH:"{#FSNAME}"}'
              name: 'DISK: O espaço livre de disco é inferior a 5% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
              priority: HIGH
              description: |
                Two conditions should match:
                1. The first condition - utilization of the space should be above `{$VFS.FS.PUSED.MAX.CRIT:"{#FSNAME}"}`.
              manual_close: 'YES'
              dependencies:
                - name: 'DISK: O espaço livre de disco é inferior a 1% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
                  expression: |
                    last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.SIZE.PUSED_DIST:"{#FSNAME}"} and 
                    last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and 
                    last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
                  recovery_expression: 'max(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused], 5m)<{$VFS.FS.SIZE.PUSED_DIST:"{#FSNAME}"}'
              tags:
                - tag: scope
                  value: capacity
            - uuid: 2c07427428944268949b999737ed9cda
              expression: |
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.SIZE.PUSED_WARN:"{#FSNAME}"}  and 
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and 
                last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused], 5m)<{$VFS.FS.SIZE.PUSED_WARN:"{#FSNAME}"}'
              name: 'DISK: O espaço livre de disco é inferior a 10% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
              priority: WARNING
              description: |
                Two conditions should match:
                1. The first condition - utilization of the space should be above `{$VFS.FS.PUSED.MAX.CRIT:"{#FSNAME}"}`.
              manual_close: 'YES'
              dependencies:
                - name: 'DISK: O espaço livre de disco é inferior a 5% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
                  expression: |
                    last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.SIZE.PUSED_HIGH:"{#FSNAME}"}  and 
                    last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and 
                    last(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
                  recovery_expression: 'max(/Windows  discovery disk by NOC/vfs.fs.size[{#FSNAME},pused], 5m)<{$VFS.FS.SIZE.PUSED_HIGH:"{#FSNAME}"}'
              tags:
                - tag: scope
                  value: capacity
          graph_prototypes:
            - uuid: ca4d169c7d034af99ce5783fee75a31f
              name: '{#FSLABEL}({#FSNAME}): Disk space usage'
              width: '600'
              height: '340'
              type: PIE
              show_3d: 'YES'
              graph_items:
                - color: '969696'
                  calc_fnc: LAST
                  type: GRAPH_SUM
                  item:
                    host: 'Windows  discovery disk by NOC'
                    key: 'vfs.fs.size[{#FSNAME},total]'
                - sortorder: '1'
                  color: C80000
                  calc_fnc: LAST
                  item:
                    host: 'Windows  discovery disk by NOC'
                    key: 'vfs.fs.size[{#FSNAME},used]'
      macros:
        - macro: '{$VFS.FS.FREE.MIN.CRIT}'
          value: 5G
          description: 'The critical threshold of the filesystem utilization.'
        - macro: '{$VFS.FS.FREE.MIN.WARN}'
          value: 10G
          description: 'The warning threshold of the filesystem utilization.'
        - macro: '{$VFS.FS.FSDRIVETYPE.MATCHES}'
          value: fixed
          description: 'This macro is used in filesystems discovery. Can be overridden on the host or linked template level.'
        - macro: '{$VFS.FS.FSDRIVETYPE.NOT_MATCHES}'
          value: ^\s$
          description: 'This macro is used in filesystems discovery. Can be overridden on the host or linked template level.'
        - macro: '{$VFS.FS.FSNAME.MATCHES}'
          value: '.*'
          description: 'This macro is used in filesystems discovery. Can be overridden on the host or linked template level.'
        - macro: '{$VFS.FS.FSNAME.NOT_MATCHES}'
          value: '^(?:/dev|/sys|/run|/proc|.+/shm$)'
          description: 'This macro is used in filesystems discovery. Can be overridden on the host or linked template level.'
        - macro: '{$VFS.FS.FSTYPE.MATCHES}'
          value: '.*'
          description: 'This macro is used in filesystems discovery. Can be overridden on the host or linked template level.'
        - macro: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
          value: ^\s$
          description: 'This macro is used in filesystems discovery. Can be overridden on the host or linked template level.'
        - macro: '{$VFS.FS.PUSED.MAX.WARN}'
          value: '95'
          description: 'The warning threshold of the filesystem utilization in percent.'
        - macro: '{$VFS.FS.SIZE.PUSED_DIST}'
          value: '99'
          description: 'The critical threshold of the filesystem utilization in percent.'
        - macro: '{$VFS.FS.SIZE.PUSED_HIGH}'
          value: '95'
          description: 'The critical threshold of the filesystem utilization in percent.'
        - macro: '{$VFS.FS.SIZE.PUSED_WARN}'
          value: '90'
      dashboards:
        - uuid: 136d59d845df4d1a9ef72c733339c59a
          name: Filesystems
          pages:
            - name: Overview
              widgets:
                - type: GRAPH_PROTOTYPE
                  width: '24'
                  height: '5'
                  fields:
                    - type: INTEGER
                      name: columns
                      value: '1'
                    - type: GRAPH_PROTOTYPE
                      name: graphid
                      value:
                        host: 'Windows  discovery disk by NOC'
                        name: '{#FSLABEL}({#FSNAME}): Disk space usage'
                    - type: INTEGER
                      name: rows
                      value: '1'
