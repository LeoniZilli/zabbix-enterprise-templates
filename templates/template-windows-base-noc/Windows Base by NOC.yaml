zabbix_export:
  version: '6.0'
  date: '2026-03-04T11:58:05Z'
  groups:
    - uuid: 57b7ae836ca64446ba2c296389c009b7
      name: Templates/Modules
  templates:
    - uuid: ff060c511c26472b8306fca201454471
      template: 'Windows Base by NOC'
      name: 'Windows Base by NOC'
      description: 'Generated by official Zabbix template tool "Templator"'
      templates:
        - name: 'Windows CPU by NOC'
        - name: 'Windows  discovery disk by NOC'
        - name: 'Windows memory by NOC'
        - name: 'Triple Check  by NOC'
      groups:
        - name: Templates/Modules
      items:
        - uuid: 79049de6188f4d05bd90fd83cfc48fa9
          name: 'Windows: Number of threads'
          type: ZABBIX_ACTIVE
          key: 'perf_counter_en["\System\Threads"]'
          history: 7d
          description: 'The number of threads used by all running processes.'
          tags:
            - tag: component
              value: os
        - uuid: 10fabf67b2974a6dab3d245510034ade
          name: 'Windows: Number of processes'
          type: ZABBIX_ACTIVE
          key: 'proc.num[]'
          history: 7d
          description: 'The number of processes.'
          tags:
            - tag: component
              value: os
        - uuid: 625eac362ede4a4586c642a92f9cde3e
          name: 'Windows: System name'
          type: ZABBIX_ACTIVE
          key: system.hostname
          delay: 1h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'The host name of the system.'
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 6ebb7c769bf640158c1e60a087d8e2f6
              expression: 'change(/Windows Base by NOC/system.hostname) and length(last(/Windows Base by NOC/system.hostname))>0'
              name: 'HOST: O nome do sistema foi alterado ({ITEM.LASTVALUE2} > {ITEM.LASTVALUE1})'
              priority: INFO
              description: 'The name of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: 1d79eb860cc14661aa975cf90a18db4b
          name: 'Windows: System local time'
          key: system.localtime
          history: 7d
          units: unixtime
          description: 'The local system time of the host.'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 9387531aa82646f0909783c80650ec9c
              expression: 'fuzzytime(/Windows Base by NOC/system.localtime,{$SYSTEM.FUZZYTIME.MAX})=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'fuzzytime(/Windows Base by NOC/system.localtime,{$SYSTEM.FUZZYTIME.MAX})=1'
              name: 'HOST: A hora do sistema está fora de sincronia (diferença maior que {$SYSTEM.FUZZYTIME.MAX}s do servidor Zabbix)'
              priority: WARNING
              description: 'The host''s system time is different from Zabbix server time.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
        - uuid: b6f9acab3302463bae8d399ccc277abc
          name: 'Windows: Operating system architecture'
          type: ZABBIX_ACTIVE
          key: system.sw.arch
          delay: 1h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'The architecture of the operating system.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: os
        - uuid: be253697b2c148bb9b78c2e121b10e52
          name: 'Windows: System description'
          type: ZABBIX_ACTIVE
          key: system.uname
          delay: 15m
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'System description of the host.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: 39cc7454d2f140378bd64108844d4644
          name: 'Windows: Uptime'
          type: ZABBIX_ACTIVE
          key: system.uptime
          delay: 30s
          history: 7d
          trends: '0'
          units: uptime
          description: 'The system uptime expressed in the following format: "N days, hh:mm:ss".'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: ee18669ba82e4823a60cc7cf382ea7a8
              expression: 'last(/Windows Base by NOC/system.uptime)<5m'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Windows Base by NOC/system.uptime)>=10m'
              name: 'HOST: {HOST.NAME} foi reiniciado (uptime < 5m)'
              priority: INFO
              description: 'The device uptime is less than 10 minutes.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
      macros:
        - macro: '{$SYSTEM.FUZZYTIME.MAX}'
          value: '120'
          description: 'The threshold for difference of system time in seconds.'
      dashboards:
        - uuid: f8a644e284e94d2f92d80a025be32139
          name: Processes
          pages:
            - name: Overview
              widgets:
                - type: GRAPH_CLASSIC
                  width: '24'
                  height: '5'
                  fields:
                    - type: ITEM
                      name: itemid
                      value:
                        host: 'Windows Base by NOC'
                        key: 'proc.num[]'
                    - type: INTEGER
                      name: source_type
                      value: '1'
                - type: GRAPH_CLASSIC
                  'y': '5'
                  width: '24'
                  height: '5'
                  fields:
                    - type: ITEM
                      name: itemid
                      value:
                        host: 'Windows Base by NOC'
                        key: 'perf_counter_en["\System\Threads"]'
                    - type: INTEGER
                      name: source_type
                      value: '1'
