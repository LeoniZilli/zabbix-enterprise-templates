zabbix_export:
  version: '6.0'
  date: '2026-02-27T17:38:54Z'
  groups:
    - uuid: 57b7ae836ca64446ba2c296389c009b7
      name: Templates/Modules
  templates:
    - uuid: e414b1428d1946248d3116cb540c3451
      template: 'Linux discovery disk by NOC'
      name: 'Linux discovery disk by NOC'
      description: 'Generated by official Zabbix template tool "Templator"'
      groups:
        - name: Templates/Modules
      discovery_rules:
        - uuid: 3bdf8b8bb1714d28853c6c06b9fb8c56
          name: 'Mounted filesystem discovery'
          type: ZABBIX_ACTIVE
          key: vfs.fs.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#FSNAME}'
                value: '{$VFS.FS.FSNAME.MATCHES}'
                formulaid: A
              - macro: '{#FSNAME}'
                value: '{$VFS.FS.FSNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#FSTYPE}'
                value: '{$VFS.FS.FSTYPE.MATCHES}'
                formulaid: C
              - macro: '{#FSTYPE}'
                value: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: D
          description: 'The discovery of mounted filesystems with different types.'
          item_prototypes:
            - uuid: 9971612fb0e44178af107f54ea984884
              name: '{#FSNAME}: Free inodes in %'
              type: ZABBIX_ACTIVE
              key: 'vfs.fs.inode[{#FSNAME},pfree]'
              history: 7d
              value_type: FLOAT
              units: '%'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
            - uuid: c5bd592b4e0a40bc8aebe965443845a1
              name: '{#FSNAME}: Space utilization'
              type: ZABBIX_ACTIVE
              key: 'vfs.fs.size[{#FSNAME},pused]'
              history: 7d
              value_type: FLOAT
              units: '%'
              description: 'The space utilization expressed in % for {#FSNAME}.'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
            - uuid: c940305253884f2b9606efd4578b0af7
              name: '{#FSNAME}: Total space'
              type: ZABBIX_ACTIVE
              key: 'vfs.fs.size[{#FSNAME},total]'
              history: 7d
              units: B
              description: 'Total space in bytes'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
            - uuid: 71c38f5f86a540f2a1beb4fcd70136c6
              name: '{#FSNAME}: Used space'
              type: ZABBIX_ACTIVE
              key: 'vfs.fs.size[{#FSNAME},used]'
              history: 7d
              units: B
              description: 'Used storage in bytes'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
          trigger_prototypes:
            - uuid: 9624896ed4044f109a5fcace25b14bb8
              expression: |
                last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.PUSED.MAX.DIST:"{#FSNAME}"} and
                last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and
                last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},pused],{$VFS.FS.SIZE.TIME_REC}) < {$VFS.FS.PUSED.MAX.DIST:"{#FSNAME}"}'
              name: 'DISK: O espaço livre de disco é inferior a 1% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
              priority: DISASTER
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: capacity
            - uuid: 9a9a0cbb0b2d40eab994cb7aa4724896
              expression: |
                last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.PUSED.MAX.HIGH:"{#FSNAME}"} and
                last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and 
                last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},pused],{$VFS.FS.SIZE.TIME_REC}) < {$VFS.FS.PUSED.MAX.HIGH:"{#FSNAME}"}'
              name: 'DISK: O espaço livre de disco é inferior a 5% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
              priority: HIGH
              description: '1. The first condition - utilization of the space should be above `{$VFS.FS.PUSED.MAX.HIGH:"{#FSNAME}"}`.'
              manual_close: 'YES'
              dependencies:
                - name: 'DISK: O espaço livre de disco é inferior a 1% no volume {#FSNAME} (usado: {ITEM.LASTVALUE2} de {ITEM.LASTVALUE3})'
                  expression: |
                    last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},pused])>={$VFS.FS.PUSED.MAX.DIST:"{#FSNAME}"} and
                    last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},used]) and
                    last(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},total])
                  recovery_expression: 'max(/Linux discovery disk by NOC/vfs.fs.size[{#FSNAME},pused],{$VFS.FS.SIZE.TIME_REC}) < {$VFS.FS.PUSED.MAX.DIST:"{#FSNAME}"}'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: capacity
          graph_prototypes:
            - uuid: 096b0b941e7948afa1b428666930307d
              name: '{#FSNAME}: Disk space usage'
              width: '600'
              height: '340'
              type: PIE
              show_3d: 'YES'
              graph_items:
                - color: '969696'
                  calc_fnc: LAST
                  type: GRAPH_SUM
                  item:
                    host: 'Linux discovery disk by NOC'
                    key: 'vfs.fs.size[{#FSNAME},total]'
                - sortorder: '1'
                  color: C80000
                  calc_fnc: LAST
                  item:
                    host: 'Linux discovery disk by NOC'
                    key: 'vfs.fs.size[{#FSNAME},used]'
          overrides:
            - name: 'Skip metadata collection for dynamic FS'
              step: '1'
              filter:
                conditions:
                  - macro: '{#FSTYPE}'
                    value: ^(btrfs|zfs)$
                    formulaid: A
              operations:
                - operationobject: ITEM_PROTOTYPE
                  operator: LIKE
                  value: inode
                  discover: NO_DISCOVER
      macros:
        - macro: '{$VFS.FS.FREE.MIN.CRIT}'
          value: 5G
          description: 'The critical threshold for utilization of the filesystem.'
        - macro: '{$VFS.FS.FREE.MIN.WARN}'
          value: 10G
          description: 'The warning threshold for utilization of the filesystem.'
        - macro: '{$VFS.FS.FSNAME.MATCHES}'
          value: .+
          description: 'This macro is used for discovery of the filesystems. It can be overridden on host level or its linked template level.'
        - macro: '{$VFS.FS.FSNAME.NOT_MATCHES}'
          value: ^(/dev|/sys|/run|/proc|.+/shm$)
          description: 'This macro is used for discovery of the filesystems. It can be overridden on host level or its linked template level.'
        - macro: '{$VFS.FS.FSTYPE.MATCHES}'
          value: ^(btrfs|ext2|ext3|ext4|reiser|xfs|ffs|ufs|jfs|jfs2|vxfs|hfs|apfs|refs|ntfs|fat32|zfs)$
          description: 'This macro is used for discovery of the filesystems. It can be overridden on host level or its linked template level.'
        - macro: '{$VFS.FS.FSTYPE.NOT_MATCHES}'
          value: ^\s$
          description: 'This macro is used for discovery of the filesystems. It can be overridden on host level or its linked template level.'
        - macro: '{$VFS.FS.INODE.PFREE.MIN.CRIT}'
          value: '10'
          description: 'The critical threshold of the filesystem metadata utilization.'
        - macro: '{$VFS.FS.INODE.PFREE.MIN.WARN}'
          value: '20'
          description: 'The warning threshold of the filesystem metadata utilization.'
        - macro: '{$VFS.FS.PUSED.MAX.DIST}'
          value: '99'
          description: 'The critical threshold of the filesystem utilization.'
        - macro: '{$VFS.FS.PUSED.MAX.HIGH}'
          value: '95'
          description: 'The warning threshold of the filesystem utilization.'
        - macro: '{$VFS.FS.SIZE.TIME_REC}'
          value: 5m
      dashboards:
        - uuid: 1d8344c0efb44f1e867dd132e9a858a3
          name: Filesystems
          pages:
            - name: Overview
              widgets:
                - type: GRAPH_PROTOTYPE
                  width: '24'
                  height: '5'
                  fields:
                    - type: INTEGER
                      name: columns
                      value: '1'
                    - type: GRAPH_PROTOTYPE
                      name: graphid
                      value:
                        host: 'Linux discovery disk by NOC'
                        name: '{#FSNAME}: Disk space usage'
                    - type: INTEGER
                      name: rows
                      value: '1'
